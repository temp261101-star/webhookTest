name: Custom Hook

on:
  push:
    paths:
      - 'index2.html'
      - 'employee.xml'

jobs:
  notify-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Send Full GitHub Payload to Backend
        run: |
          curl -X POST http://182.48.194.218:8181/auth/github/actionPayload \
          -H "Content-Type: application/json" \
          -d '${{ toJson(github.event) }}'